kind = "web"
previewPath = "/"
title = "World of Flowers"
version = "1.0.0"
id = "artifacts/flower-world"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18348

[services.development]
run = "pnpm --filter @workspace/flower-world run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flower-world", "run", "build" ]
publicDir = "artifacts/flower-world/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18348"
BASE_PATH = "/"
